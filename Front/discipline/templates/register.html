<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../static/discipline.png" type="image/png">
    <link rel="stylesheet" href="../static/discipline.css">
    <script src="../static/main.js"></script>
    <title>Discipline | Register</title>
</head>

<body>

<header>
    <nav class="navbar">
        <h1 class="logo">Discipline</h1>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="workout.html">Workouts</a></li>
            <li><a href="nutrition.html">Nutrition</a></li>
            <li><a href="progress.html">Progress</a></li>

            <li id="loginItem"><a href="login.html">Login</a></li>
            <li>
                <div id="avatar" class="avatar" style="display:none;"></div>
            </li>
        </ul>
    </nav>
</header>

<section class="login-page">
    <div class="login-container">

        <!-- Image Section -->
        <div class="login-image">
            <img src="../static/loginpage.jpeg" alt="Healthy life">
        </div>

        <!-- Form Section -->
        <div class="login-form">
            <h2>Discipline</h2>
            <h3>Create Your Account</h3>

            <form id="registerForm">

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Username"
                    required
                    pattern="^[a-zA-Z0-9_]+$"
                    title="Only letters, numbers, and underscore (_) allowed"
                >

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Email"
                    required
                    pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$"
                    title="Only Gmail addresses allowed"
                >

                <div style="position: relative;">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Password"
                        required
                        pattern="^[a-zA-Z0-9]{6,}$"
                        title="At least 6 characters, letters and numbers only"
                    >
                    <span
                        onclick="togglePassword('password')"
                        style="position:absolute; right:10px; top:10px; cursor:pointer;"
                    >
                        👁️
                    </span>
                </div>

                <div style="position: relative;">
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Confirm Password"
                        required
                    >
                    <span
                        onclick="togglePassword('confirm_password')"
                        style="position:absolute; right:10px; top:10px; cursor:pointer;"
                    >
                        👁️
                    </span>
                </div>

                <button type="submit">Register</button>

            </form>

            <!-- Login Link -->
            <div class="register-link">
                <p>Already have an account? <a href="login.html">Login Here</a></p>
            </div>

        </div>

    </div>
</section>

<section class="copyright">
    <h5>
        2026 &copy; All rights reserved to Eng-Sarah Montaser
    </h5>
</section>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    if (!input) return;

    input.type = input.type === "password" ? "text" : "password";
}

// 🟢 Register logic
const registerForm = document.getElementById("registerForm");

if (registerForm) {
    registerForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm_password").value;

        const usernameRegex = /^[a-zA-Z0-9_]+$/;
        if (!usernameRegex.test(username)) {
            alert("Username must contain only letters, numbers, and underscore (_)");
            return;
        }

        const emailRegex = /^[a-z0-9._%+-]+@gmail\.com$/;
        if (!emailRegex.test(email)) {
            alert("Email must be a Gmail address");
            return;
        }

        const passwordRegex = /^[a-zA-Z0-9]{6,}$/;
        if (!passwordRegex.test(password)) {
            alert("Password must be at least 6 characters and contain only letters and numbers");
            return;
        }

        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }

        try {
            const response = await fetch("http://127.0.0.1:5000/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username,
                    email,
                    password
                })
            });

            const result = await response.json();

            alert(result.message);

            if (response.ok) {
                localStorage.setItem("userName", username);
                window.location.href = "home.html";
            }

        } catch (err) {
            console.error(err);
            alert("Server error");
        }
    });
}
</script>

</body>
</html>
