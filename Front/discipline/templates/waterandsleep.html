<main class="progress-page">

    <!-- WATER -->
    <div class="goal-card">
        <h3>💧 Water</h3>

        <canvas id="waterCircle" width="200" height="200"></canvas>
        <p id="waterInfo">0 / 0 L</p>

        <input type="number" id="waterGoalInput" step="0.5" placeholder="Set water goal (L)">
        <button onclick="setWaterGoalInput()">Set Goal</button>
        <button onclick="addWater()">+ 0.2 L</button>
        <button onclick="resetWater()">Reset</button>
    </div>

    <!-- SLEEP -->
    <div class="goal-card">
        <h3>🌙 Sleep</h3>

        <canvas id="sleepCircle" width="200" height="200"></canvas>
        <p id="sleepInfo">0 / 0 hrs</p>

        <input type="number" id="sleepGoalInput" step="0.5" placeholder="Set sleep goal (hrs)">
        <button onclick="setSleepGoalInput()">Set Goal</button>
        <button onclick="addSleep()">+ 1 hr</button>
        <button onclick="resetSleep()">Reset</button>
    </div>

    <!-- WATER REMINDER -->
    <section class="reminder">
        <h3>⏰ Water Reminder</h3>

        <input type="number" id="reminderInterval" placeholder="Interval (minutes)">
        <button onclick="startWaterReminder()">Start Reminder</button>
        <button onclick="stopWaterReminder()">Stop Reminder</button>
    </section>

</main>
