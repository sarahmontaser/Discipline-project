<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../static/discipline.png" type="image/png">
    <link rel="stylesheet" href="../static/discipline.css">
    <script src="../static/main.js"></script>
    <title>Discipline | Profile</title>
</head>

<body>

<header>
    <nav class="navbar">
        <h1 class="logo">Discipline</h1>
        <ul class="nav-links">
            <li><a href="home.html" class="active">Home</a></li>
            <li><a href="workout.html">Workouts</a></li>
            <li><a href="nutrition.html">Nutrition</a></li>
            <li><a href="progress.html">Progress</a></li>

            <li id="loginItem"><a href="login.html">Login</a></li>
            <li>
                <div id="avatar" class="avatar" style="display:none;"></div>
            </li>
        </ul>
    </nav>
</header>

<section class="login-page">
    <div class="login-container">

        <div class="login-image">
            <img src="../static/loginpage.jpeg" alt="Healthy life">
        </div>

        <div class="login-form">
            <h2>Discipline</h2>
            <h3>Edit Profile</h3>

            <!-- Email ثابت -->
            <p><strong>Email:</strong> <span id="userEmail"></span></p>

            <!-- Username ثابت (عرض فقط) -->
            <p><strong>Username:</strong> <span id="userName"></span></p>

            <!-- تغيير الباسورد فقط -->
            <input type="password" id="newPassword" placeholder="New Password">

            <div>
                <button type="button" onclick="saveChanges()">Save</button>
            </div>

            <div>
                <button type="button" onclick="logout()">Logout</button>
            </div>

        </div>
    </div>
</section>

<section class="copyright">
    <h5>
        2026 &copy; All rights reserved to Eng-Sarah Montaser
    </h5>
</section>

<script>
window.addEventListener("DOMContentLoaded", () => {
    const email = localStorage.getItem("email");
    const username = localStorage.getItem("username");

    if (!email) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("userEmail").textContent = email;
    document.getElementById("userName").textContent = username || email.split("@")[0];
});

function saveChanges() {
    const email = localStorage.getItem("email");
    const newPassword = document.getElementById("newPassword").value;

    if (!email) {
        alert("No email found");
        return;
    }

    if (!newPassword) {
        alert("Enter new password");
        return;
    }

    fetch("http://127.0.0.1:5000/update-user", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email: email,
            password: newPassword
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        localStorage.setItem("password", newPassword);
    })
    .catch(err => {
        console.error(err);
        alert("Error updating password");
    });
}

function logout() {
    localStorage.removeItem("email");
    localStorage.removeItem("username");

    window.location.href = "login.html";
}
</script>

</body>
</html>
